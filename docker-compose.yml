services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ${COMPOSE_PROJECT_NAME:-nexus}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations are applied by the api service on startup via goose
      # (embedded in the binary), not by postgres initdb.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexus}"]
      interval: 60s
      timeout: 5s
      retries: 5
    networks:
      - nexus_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-nexus}-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - "${API_EXTERNAL_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus_net

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-nexus}-simulator
    restart: unless-stopped
    command: ["/app/simulator"]
    environment:
      API_BASE_URL: http://api:8080
      INTERVAL_SEC: "3"
      SERVICE_TOKEN: ${SERVICE_TOKEN}
    depends_on:
      api:
        condition: service_started
    networks:
      - nexus_net

  # Python API: auth, discussions + WebSocket, metrics, chatbot.
  chat_api:
    build:
      context: .
      dockerfile: Dockerfile.chatapi
    container_name: ${COMPOSE_PROJECT_NAME:-nexus}-chatapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres      # connect to the postgres container over the network
      DB_PORT: "5432"        # internal port (not the host-published 5434)
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus_net

  # TLS reverse proxy (production). Only starts with: docker compose --profile prod up
  # Terminates HTTPS and proxies to api (+ chat_api on the host). Dev `up` skips it.
  caddy:
    image: caddy:2-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-nexus}-caddy
    profiles: ["prod"]
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-internal}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    networks:
      - nexus_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  nexus_net:
    name: ${COMPOSE_PROJECT_NAME:-nexus}-network
